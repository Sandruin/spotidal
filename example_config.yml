config_version: 2

spotify:
  client_id: your_client_id
  client_secret: your_client_secret
  username: your_spotify_username
  redirect_uri: http://127.0.0.1:8888/callback

sync:
  # "one-way" or "two-way"
  mode: two-way

  # Only used when mode is "one-way": "spotify-to-tidal" or "tidal-to-spotify"
  direction: spotify-to-tidal

  # Whether to sync liked/saved tracks (favorites)
  favorites: true

  # Whether to propagate deletions in two-way mode
  allow_deletions: false

  # Playlists to sync. Set tidal_id to null if it doesn't exist yet (will be created).
  playlists:
    - name: My Playlist
      spotify_id: 1ABCDEqsABCD6EaABCDa0a
      tidal_id: a0b1234-0a1b-012a-abcd-a1b234c5d6d7
    - name: Another Playlist
      spotify_id: 2BCDEFrtBCDE7FbBCDEb1b
      tidal_id: null

# Performance tuning
max_concurrency: 10
rate_limit: 10
